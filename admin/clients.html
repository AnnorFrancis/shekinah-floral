<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients — Shekinah Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script>try{var t=localStorage.getItem('sfd-admin-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body class="admin" data-page="clients">

<div class="admin-shell">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M24 6c4 5.5 4 12.5 0 18-4-5.5-4-12.5 0-18z"/>
        <path d="M24 24c5.5-4 12.5-4 18 0-5.5 4-12.5 4-18 0z"/>
        <path d="M24 24c-5.5-4-12.5-4-18 0 5.5 4 12.5 4 18 0z"/>
        <path d="M24 24v16" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="admin-logo-name">Shekinah</div>
        <div class="admin-logo-tag">Admin Suite</div>
      </div>
    </div>
    <nav class="admin-nav" aria-label="Admin">
      <div class="admin-nav-label">Manage</div>
      <a href="./dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg>Dashboard</a>
      <a href="./bookings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18" stroke-linecap="round"/></svg>Bookings</a>
      <a href="./inventory.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/><path d="M3.5 8.5L12 13l8.5-4.5M12 13v8"/></svg>Inventory</a>
      <a href="./clients.html" class="is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5" stroke-linecap="round"/><circle cx="17" cy="9" r="2.5"/><path d="M16.5 15c2.6.2 4.4 1.7 5 4.5" stroke-linecap="round"/></svg>Clients</a>
      <a href="./analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" stroke-linecap="round"/></svg>Analytics</a>
    </nav>
    <div class="admin-sidebar-foot">
      <button class="theme-toggle" type="button">
        <span>Dark mode</span>
        <span class="track"><span class="thumb"></span></span>
      </button>
      <a class="back-to-site" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m6-6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        View website
      </a>
    </div>
  </aside>
  <div class="sidebar-backdrop"></div>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="sidebar-toggle" aria-label="Open menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg></button>
      <div class="topbar-title">
        <h1>Client Database</h1>
        <p>Relationships, history and follow-ups</p>
      </div>
      <div class="topbar-spacer"></div>
      <button class="a-btn a-btn--gold" id="add-client">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        New Client
      </button>
      <div class="topbar-avatar">SF</div>
    </header>

    <main class="admin-content">

      <div class="panel">
        <div class="filter-row">
          <div class="grow"><input class="a-input" id="cl-search" type="search" placeholder="Search by name, phone or email…" aria-label="Search clients"></div>
        </div>
      </div>

      <div class="panel">
        <div class="table-wrap">
          <table class="a-table">
            <thead>
              <tr>
                <th>Client</th><th>Phone</th><th>Events</th><th>Total spent</th><th>Last event</th><th>Source</th>
              </tr>
            </thead>
            <tbody id="clients-body"></tbody>
          </table>
        </div>
        <p class="panel-sub" style="margin-top:0.8rem;">Click any row to see full history and notes.</p>
      </div>

    </main>
  </div>
</div>

<!-- Drawer -->
<div class="a-modal-backdrop" id="drawer-backdrop"></div>
<aside class="a-drawer" id="client-drawer" role="dialog" aria-label="Client details">
  <div class="a-drawer-head">
    <h2 id="drawer-title">Client</h2>
    <button class="a-drawer-close" id="drawer-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="a-drawer-body" id="drawer-body"></div>
</aside>

<script src="../js/admin.js" defer></script>
</body>
</html>
